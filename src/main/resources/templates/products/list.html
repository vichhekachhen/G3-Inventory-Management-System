<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <title>Products - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <meta charset="UTF-8">
</head>

<body>
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='products')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Product Management')}"></div>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold">Product Management</h4>
                    <a th:href="@{/products/add}" class="btn btn-primary px-4 shadow-sm">
                        <i class="bi bi-plus-lg"></i> Create New
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr class="small text-uppercase text-secondary">
                                    <th class="ps-4">SKU</th>
                                    <th>Product Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Quantity</th>
                                    <th>Expiry Date</th>
                                    <th>Status</th>
                                    <th class="pe-4 text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${products}">
                                    <td class="ps-4 text-muted" th:text="${p.sku}">C0001</td>
                                    <td class="fw-bold" th:text="${p.name}">Chinese Coffee Bean</td>
                                    <td class="text-muted" th:text="${p.category.name}">Coffee Bean</td>
                                    <td th:text="${#numbers.formatCurrency(p.price)}">$3.50</td>
                                    <td th:text="${p.currentQuantity}">100</td>
                                    <td class="text-muted" th:text="${p.expiryDate ?: 'N/A'}">N/A</td>
                                    <td>
                                        <span
                                            class="badge rounded-pill bg-success-subtle text-success border border-success-subtle px-3"
                                            th:if="${p.currentQuantity > 0}">In Stock</span>
                                    </td>
                                    <td class="pe-4 text-end">
                                        <a th:href="@{/products/edit/{id}(id=${p.productId})}"
                                            class="btn btn-sm btn-outline-primary me-2">Edit</a>
                                        <form th:action="@{/products/delete/{id}(id=${p.productId})}" method="post"
                                            class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</body>

</html>
