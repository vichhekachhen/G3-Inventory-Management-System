<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Products - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body>
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='products')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Product Management')}"></div>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-end mb-4">
                    <a th:href="@{/products/add}" class="btn btn-primary px-4 shadow-sm">
                        <i class="bi bi-plus"></i> + Create New Product
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">SKU</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Product Name</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Category</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Price</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Quantity</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Expiry Date</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Status</th>
                                    <th class="pe-4 py-3 text-secondary text-uppercase text-end" style="font-size: 0.75rem;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="product : ${products}">
                                    <td class="ps-4 text-monospace" th:text="${product.sku}">SKU-001</td>
                                    <td class="fw-bold text-dark" th:text="${product.name}">Product Name</td>
                                    <td class="text-muted" th:text="${product.category != null ? product.category.name : 'Uncategorized'}">Category</td>
                                    <td th:text="${#numbers.formatCurrency(product.price)}">$0.00</td>
                                    <td th:text="${product.currentQuantity}">0</td>
                                    <td th:text="${product.expiryDate != null ? #temporals.format(product.expiryDate, 'dd-MM-yyyy') : 'N/A'}">01-01-2026</td>
                                    <td>
                                        <span th:class="|badge rounded-pill ${product.currentQuantity > 0 ? 'bg-success-subtle text-success' : 'bg-danger-subtle text-danger'}|"
                                              th:text="${product.currentQuantity > 0 ? 'In Stock' : 'Out of Stock'}">
                                            Status
                                        </span>
                                    </td>
                                    <td class="pe-4 text-end">
                                        <a th:href="@{/products/edit/{id}(id=${product.productId})}" class="btn btn-sm btn-outline-primary me-2">Edit</a>
                                        <form th:action="@{/products/delete/{id}(id=${product.productId})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this product?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(products)}">
                                    <td colspan="7" class="text-center py-5 text-muted">
                                        <p class="mb-0">No products found.</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
