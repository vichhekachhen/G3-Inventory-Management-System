<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Product - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link rel="stylesheet" th:href="@{/css/products.css}" />
    <meta charset="UTF-8">
</head>

<body>
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='products')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Create New Product')}"></div>

            <div class="p-6">
                <div class="form-card">
                    <form th:action="@{/products/save}" th:object="${product}" method="post">

                        <div class="form-grid">
                            <div class="form-group">
                                <label for="sku" class="fw-bold">SKU (Stock Keeping Unit)</label>
                                <input type="text" id="sku" th:field="*{sku}" class="form-control"
                                    th:classappend="${#fields.hasErrors('sku')} ? 'is-invalid' : ''"
                                    placeholder="e.g. ELEC-001" required>

                                <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}">
                                    SKU Error Message
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="name">Product Name</label>
                                <input type="text" id="name" th:field="*{name}" placeholder="Enter product name"
                                    required>
                            </div>

                            <div class="form-group">
                                <label for="category">Category</label>
                                <select id="category" th:field="*{category}" required>
                                    <option value="" disabled selected>Select a category</option>
                                    <option th:each="cat : ${categories}" th:value="${cat.categoryId}"
                                        th:text="${cat.name}">Category Name</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="price">Unit Price</label>
                                <input type="number" step="0.01" id="price" th:field="*{price}" required>
                            </div>

                            <div class="form-group">
                                <label for="currentQuantity">Initial Quantity</label>
                                <input type="number" id="currentQuantity" th:field="*{currentQuantity}" required>
                            </div>

                            <div class="form-group">
                                <label for="minStockLevel">Minimum Stock Level</label>
                                <input type="number" id="minStockLevel" th:field="*{minStockLevel}">
                            </div>
                        </div>

                        <div class="form-actions">
                            <a th:href="@{/products}" class="btn-cancel">Cancel</a>
                            <button type="submit" class="btn-submit">Save Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
