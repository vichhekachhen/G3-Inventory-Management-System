<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body class="bg-light">
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='products')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Create New Product')}"></div>

            <div class="container-fluid p-4">
                <div class="row ">
                    <div class="col-md">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white py-3 border-bottom-0">
                                <h5 class="card-title mb-0 text-primary">Product Details</h5>
                            </div>
                            <div class="card-body p-4">
                                <form th:action="@{/products/save}" th:object="${product}" method="post">
                                    
                                    <div class="row">
                                        <div class="col-md-6 mb-4">
                                            <label for="sku" class="form-label fw-bold text-secondary">Stock Keeping Unit</label>
                                            <input type="text" id="sku" th:field="*{sku}" 
                                                   class="form-control form-control-lg" 
                                                   th:classappend="${#fields.hasErrors('sku')} ? 'is-invalid' : ''" 
                                                   placeholder="e.g. ELEC-001" required>
                                            <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
                                            <div class="form-text">SKU must be a unique.</div>
                                        </div>

                                        <div class="col-md-6 mb-4">
                                            <label for="name" class="form-label fw-bold text-secondary">Product Name</label>
                                            <input type="text" id="name" th:field="*{name}" 
                                                   class="form-control form-control-lg" placeholder="" required>
                                        </div>

                                        <div class="col-md-6 mb-4">
                                            <label for="category" class="form-label fw-bold text-secondary">Category</label>
                                            <select id="category" th:field="*{category}" class="form-select form-control-lg" required>
                                                <option value="" disabled selected>Select a category</option>
                                                <option th:each="cat : ${categories}" 
                                                        th:value="${cat.categoryId}" 
                                                        th:text="${cat.name}">Category Name</option>
                                            </select>
                                        </div>

                                        <div class="col-md-6 mb-4">
                                            <label for="price" class="form-label fw-bold text-secondary">Unit Price</label>
                                            <div class="input-group">
                                                <span class="input-group-text">$</span>
                                                <input type="number" step="0.01" id="price" th:field="*{price}" 
                                                       class="form-control form-control-lg" required>
                                            </div>
                                        </div>

                                        <div class="col-md-4 mb-4">
                                            <label for="currentQuantity" class="form-label fw-bold text-secondary">Initial Quantity</label>
                                            <input type="number" id="currentQuantity" th:field="*{currentQuantity}" 
                                                   class="form-control form-control-lg" required>
                                        </div>

                                        <div class="col-md-4 mb-4">
                                            <label for="minStockLevel" class="form-label fw-bold text-secondary">Min Stock Level</label>
                                            <input type="number" id="minStockLevel" th:field="*{minStockLevel}" 
                                                   class="form-control form-control-lg">
                                        </div>

                                        <div class="col-md-4 mb-4">
                                            <label for="expiryDate" class="form-label fw-bold text-secondary">Expiry Date</label>
                                            <input type="date" id="expiryDate" th:field="*{expiryDate}" 
                                                   class="form-control form-control-lg">
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-end gap-2 pt-3 border-top mt-2">
                                        <a th:href="@{/products}" class="btn btn-light px-4">Cancel</a>
                                        <button type="submit" class="btn btn-primary px-4">Save Product</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
