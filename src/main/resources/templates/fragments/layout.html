<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
</head>
<body>

    <nav th:fragment="sidebar" class="sidebar shadow">
        <div class="sidebar-header">
            <i class="bi bi-box-seam me-2"></i>
            <span>InventoryPro</span>
        </div>
        
        <ul class="nav-links">
            <li>
                <a th:href="@{/dashboard}" th:classappend="${activePage == 'dashboard' ? 'active' : ''}">
                    <i class="bi bi-speedometer2"></i> Dashboard
                </a>
            </li>
            <li>
                <a th:href="@{/products}" th:classappend="${activePage == 'products' ? 'active' : ''}">
                    <i class="bi bi-tags"></i> Products
                </a>
            </li>
            <li>
                <a th:href="@{/categories}" th:classappend="${activePage == 'categories' ? 'active' : ''}">
                    <i class="bi bi-grid"></i> Categories
                </a>
            </li>
            <li>
                <a th:href="@{/stocks}" th:classappend="${activePage == 'stocks' ? 'active' : ''}">
                    <i class="bi bi-box-arrow-in-right"></i> Stocks
                </a>
            </li>
            <li>
                <a th:href="@{/sales}" th:classappend="${activePage == 'sales' ? 'active' : ''}">
                    <i class="bi bi-cart"></i> Sales
                </a>
            </li>
            <li>
                <a th:href="@{/reports}" th:classappend="${activePage == 'reports' ? 'active' : ''}">
                    <i class="bi bi-graph-up"></i> Reports
                </a>
            </li>
            
            <li th:if="${#authorization.expression('hasAuthority(''ADMIN'')')}">
                <a th:href="@{/users}" th:classappend="${activePage == 'users' ? 'active' : ''}">
                    <i class="bi bi-people"></i> Manage Users
                </a>
            </li>

            <li>
                <a th:href="@{/settings}" th:classappend="${activePage == 'settings' ? 'active' : ''}">
                    <i class="bi bi-gear"></i> Settings
                </a>
            </li>
            
            <li class="logout-item">
                <form th:action="@{/logout}" method="post" id="logoutForm">
                    <button type="submit" class="btn-logout">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </button>
                </form>
            </li>
        </ul>
    </nav>

    <header th:fragment="header(pageTitle)" class="top-bar px-4 py-3 bg-white shadow-sm border-bottom">
        <div class="d-flex align-items-center">
            <h1 class="h4 mb-0 fw-bold text-dark" th:text="${pageTitle}">Page Title</h1>
        </div>
        
        <div class="user-profile d-flex align-items-center">
            <span>Welcome, <b th:text="${#authentication.name}">User</b></span>
        </div>
    </header>

    <footer th:fragment="footer" class="py-3 mt-auto border-top bg-white">
        <div class="container-fluid px-4">
            <div class="d-flex align-items-center justify-content-between small text-muted">
                <div>&copy; 2026 InventoryPro &middot; v1.0</div>
                <div class="footer-links">
                    <a href="#" class="text-decoration-none text-muted me-2">Privacy Policy</a>
                    &middot;
                    <a href="#" class="text-decoration-none text-muted ms-2">Terms &amp; Conditions</a>
                </div>
            </div>
        </div>
    </footer>

</body>
</html>
