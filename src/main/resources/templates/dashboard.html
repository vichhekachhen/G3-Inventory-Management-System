<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <title>Dashboard - InventoryPro</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-light">
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='dashboard')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='System Overview')}"></div>

            <div class="p-4">
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-between mb-3">
                                    <div class="avatar bg-primary-subtle text-primary rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                        <i class="bi bi-box-seam fs-4"></i>
                                    </div>
                                    <span class="badge bg-success-subtle text-success border border-success-subtle small">Active</span>
                                </div>
                                <h6 class="text-secondary small text-uppercase fw-bold">Total Products</h6>
                                <h2 class="fw-bold mb-0" th:text="${totalProducts}">0</h2>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-between mb-3">
                                    <div class="avatar bg-success-subtle text-success rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                        <i class="bi bi-currency-dollar fs-4"></i>
                                    </div>
                                </div>
                                <h6 class="text-secondary small text-uppercase fw-bold">Estimated Stock Value</h6>
                                <h2 class="fw-bold mb-0 text-success" th:text="${stockValue}">$0</h2>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-between mb-3">
                                    <div class="avatar bg-warning-subtle text-warning rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                        <i class="bi bi-exclamation-triangle fs-4"></i>
                                    </div>
                                    <span class="badge bg-warning-subtle text-warning border border-warning-subtle small" th:if="${lowStockCount > 0}">Warning</span>
                                </div>
                                <h6 class="text-secondary small text-uppercase fw-bold">Low Stock Items</h6>
                                <h2 class="fw-bold mb-0 text-warning" th:text="${lowStockCount}">0</h2>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-body">
                                <div class="d-flex align-items-center justify-content-between mb-3">
                                    <div class="avatar bg-danger-subtle text-danger rounded-circle d-flex align-items-center justify-content-center" style="width: 45px; height: 45px;">
                                        <i class="bi bi-calendar-x fs-4"></i>
                                    </div>
                                    <span class="badge bg-danger-subtle text-danger border border-danger-subtle small" th:if="${expiringSoonCount > 0}">Critical</span>
                                </div>
                                <h6 class="text-secondary small text-uppercase fw-bold">Expiring Soon</h6>
                                <h2 class="fw-bold mb-0 text-danger" th:text="${expiringSoonCount}">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="card shadow-sm border-0 mb-4">
                            <div class="card-header bg-white py-3 border-0">
                                <h6 class="mb-0 fw-bold text-dark"><i class="bi bi-bell me-2 text-danger"></i>Attention Required</h6>
                            </div>
                            <div class="card-body pt-0">
                                <div class="alert alert-warning border-0 small mb-2 py-2" th:if="${lowStockCount > 0}">
                                    <i class="bi bi-info-circle me-2"></i> 
                                    <span th:text="${lowStockCount} + ' products are below minimum stock level.'"></span>
                                </div>
                                <div class="alert alert-danger border-0 small py-2" th:if="${expiringSoonCount > 0}">
                                    <i class="bi bi-x-circle me-2"></i> 
                                    <span th:text="${expiringSoonCount} + ' products expiring within 60 days.'"></span>
                                </div>
                                <div class="text-center py-3 text-muted" th:if="${lowStockCount == 0 and expiringSoonCount == 0}">
                                    <i class="bi bi-check-circle-fill text-success fs-1 d-block mb-2"></i>
                                    <p class="small mb-0">System health is excellent.</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="card shadow-sm border-0 mb-4">
                            <div class="card-header bg-white py-3 border-0">
                                <h6 class="mb-0 fw-bold text-dark"><i class="bi bi-graph-down-arrow me-2 text-warning"></i>Low Stock Inventory</h6>
                            </div>
                            <div class="card-body p-0">
                                <div class="table-responsive">
                                    <table id="transactionTable" class="table table-hover align-middle w-100">
                                        <thead class="table-light">
                                            <tr class="small text-uppercase text-secondary">
                                                <th class="ps-4">Product</th>
                                                <th>Current</th>
                                                <th>Min. Level</th>
                                                <th class="pe-4 text-end">Action</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr th:each="p : ${lowStockProducts}">
                                                <td class="ps-4">
                                                    <div class="fw-bold" th:text="${p.name}">Product Name</div>
                                                    <small class="text-muted" th:text="${p.sku}">SKU</small>
                                                </td>
                                                <td>
                                                    <span class="badge bg-danger-subtle text-danger px-3 py-2" th:text="${p.currentQuantity}">0</span>
                                                </td>
                                                <td class="text-muted" th:text="${p.minStockLevel}">5</td>
                                                <td class="pe-4 text-end">
                                                    <a th:href="@{/stocks}" class="btn btn-sm btn-primary">Restock</a>
                                                </td>
                                            </tr>
                                            <tr th:if="${#lists.isEmpty(lowStockProducts)}">
                                                <td colspan="4" class="text-center py-4 text-muted small">No low stock items detected.</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
