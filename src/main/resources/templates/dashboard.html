<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Dashboard - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div class="dashboard-container">

        <!-- Sidebar -->
        <div th:replace="~{fragments/layout :: sidebar(activePage='dashboard')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Dashboard')}"></div>
            <!-- Header -->
            <div class="p-4">
                <!-- Stats Cards -->
                <div class="row g-4 mb-4">
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center">
                            <div class="card-body">
                                <h6 class="text-secondary">Total Products</h6>
                                <h2 class="fw-bold text-primary" th:text="${totalProducts}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center">
                            <div class="card-body">
                                <h6 class="text-secondary">Stock Value</h6>
                                <h2 class="fw-bold text-success" th:text="${stockValue}">$0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center">
                            <div class="card-body">
                                <h6 class="text-secondary">Low Stock</h6>
                                <h2 class="fw-bold text-warning" th:text="${lowStockCount}">0</h2>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card shadow-sm border-0 text-center">
                            <div class="card-body">
                                <h6 class="text-secondary">Expiring Soon</h6>
                                <h2 class="fw-bold text-danger" th:text="${expiringSoonCount}">0</h2>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Alerts Section -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header text-danger fw-bold">

                        ⚠️ Attention Required
                    </div>
                    <div class="card-body">
                        <p th:text="'• ' + ${lowStockCount} + ' product(s) running low on stock.'"></p>
                        <p th:text="'• ' + ${expiringSoonCount} + ' product(s) expiring within 2 months.'"></p>

                    </div>
                </div>
                <!-- Low Stock List -->
                <div class="card shadow-sm border-0 mb-4">
                    <div class="card-header text-warning fw-bold">
                       Low Stock Alert
                    </div>
                    <ul class="list-group">
                        <li class="list-group-item" th:each="p : ${lowStockProducts}">Product:
                            <strong th:text="${p.name}">Product Name</strong>
                            <span class="text-muted"> (SKU: <span th:text="${p.sku}"></span>)</span><br>
                            Current stock <span th:text="${p.currentQuantity}" class="fw-bold text-danger"></span> units
                            (Minimum only: <span th:text="${p.minStockLevel}" class="fw-bold"></span>)
                        </li>
                    </ul>
                </div>
            </div>
            <!-- Footer -->
            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
