<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <title>Settings - InventoryPro</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='settings')}"></div>
        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='System Settings')}"></div>

            <div class="container-fluid p-4">
                <div class="card border-0 shadow-sm col-md-8 mx-auto">
                    <div class="card-body p-4">
                        <div class="mb-4">
                            <h5 class="fw-bold">Profile Settings</h5>
                            <p class="text-muted small">Update your account information.</p>
                        </div>
                        <form id="settingsForm">
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label small fw-bold">Username</label>
                                    <input type="text" class="form-control" th:value="${#authentication.name}" readonly>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-bold">Change Password</label>
                                <input type="password" class="form-control mb-2" placeholder="New Password">
                                <input type="password" class="form-control" placeholder="Confirm New Password">
                            </div>
                            <hr>
                            <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
