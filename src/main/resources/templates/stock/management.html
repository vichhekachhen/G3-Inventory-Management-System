<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <title>Stock Management - InventoryPro</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='stocks')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Stock Management')}"></div>

            <div class="container-fluid p-4">
                <div class="row g-4">
                    <div class="col-lg-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-white py-3 border-0">
                                <h5 class="mb-0 fw-bold">New Transaction</h5>
                            </div>
                            <div class="card-body">
                                <form th:action="@{/api/stock/save}" th:object="${transaction}" method="post" id="stockForm">
                                    <div class="btn-group w-100 mb-4" role="group">
                                        <input type="radio" class="btn-check" name="type" id="typeIn" value="STOCK_IN" checked>
                                        <label class="btn btn-outline-success py-2" for="typeIn">
                                            <i class="bi bi-arrow-up-circle me-1"></i> Stock In
                                        </label>
                                        <input type="radio" class="btn-check" name="type" id="typeOut" value="STOCK_OUT">
                                        <label class="btn btn-outline-danger py-2" for="typeOut">
                                            <i class="bi bi-arrow-down-circle me-1"></i> Stock Out
                                        </label>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted">Select Product *</label>
                                        <select th:field="*{product}" class="form-select" required>
                                            <option value="" selected disabled>Choose a product...</option>
                                            <option th:each="p : ${products}" th:value="${p.productId}" 
                                                    th:text="${p.name + ' (Qty: ' + p.currentQuantity + ')'}"></option>
                                        </select>
                                    </div>

                                    <div class="mb-3">
                                        <label class="form-label small fw-bold text-muted">Quantity *</label>
                                        <input type="number" th:field="*{quantity}" class="form-control" min="1" value="1" required>
                                    </div>

                                    <div class="mb-4">
                                        <label class="form-label small fw-bold text-muted">Notes</label>
                                        <textarea th:field="*{reason}" class="form-control" rows="3" placeholder="Optional transaction notes..."></textarea>
                                    </div>

                                    <button type="submit" class="btn btn-success w-100 py-2 fw-bold shadow-sm" id="submitBtn">
                                        Record Stock In
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="col-lg-8">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-white py-3 border-0 d-flex justify-content-between align-items-center">
                                <h5 class="mb-0 fw-bold">Transaction History</h5>
                                <i class="bi bi-calendar3 text-muted"></i>
                            </div>
                            <div class="card-body">
                                <table id="transactionTable" class="table table-hover align-middle w-100">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Product Info</th>
                                            <th>Type</th>
                                            <th>Change</th>
                                            <th>Date</th>
                                            <th>Handled By</th>
                                        </tr>
                                    </thead>
                                    <tbody class="small">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script th:src="@{/js/stock_transaction.js}"></script>
</body>
</html>
