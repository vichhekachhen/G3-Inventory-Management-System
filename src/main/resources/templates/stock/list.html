<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Stock History - InventoryPro</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-bootstrap-4/bootstrap-4.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body class="bg-light">
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='stocks')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Stock Transactions')}"></div>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="text-secondary fw-bold">Transaction History</h4>
                    <a th:href="@{/stock}" class="btn btn-primary px-4 shadow-sm">
                        <i class="bi bi-arrow-left me-1"></i> Management View
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <table id="transactionTable" class="table table-hover align-middle w-100">
                            <thead class="table-light">
                                <tr class="small text-uppercase text-secondary">
                                    <th>Product Info</th>
                                    <th>Type</th>
                                    <th>Movement</th>
                                    <th>Date</th>
                                    <th>Handled By</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>
            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>
    
    <script th:src="@{/js/stock_transaction.js}"></script>
</body>
</html>
