<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Category - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>

<body class="bg-light">
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='categories')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Create Category')}"></div>

            <div class="container-fluid p-4">
                <div class="row">
                    <div class="col-md">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white py-3 border-bottom-0">
                                <h5 class="card-title mb-0 text-primary">Category Details</h5>
                            </div>
                            <div class="card-body p-4">
                                <form th:action="@{/categories/save}" th:object="${category}" method="post">

                                    <div class="mb-4">
                                        <label for="name" class="form-label fw-bold text-secondary">Category
                                            Name</label>
                                        <input type="text" id="name" th:field="*{name}"
                                            class="form-control form-control-lg" placeholder="" required>
                                        <div class="form-text">*Must be a unique name for your inventory grouping.</div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="description"
                                            class="form-label fw-bold text-secondary">Description</label>
                                        <textarea id="description" th:field="*{description}" class="form-control"
                                            rows="4" placeholder=""></textarea>
                                    </div>

                                    <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                                        <a th:href="@{/categories}" class="btn btn-light px-4">Cancel</a>
                                        <button type="submit" class="btn btn-primary px-4">Save Category</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
