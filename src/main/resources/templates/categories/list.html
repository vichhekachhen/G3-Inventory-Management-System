<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <title>Categories - InventoryPro</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <meta charset="UTF-8">
</head>
<body class="bg-light">
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='categories')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Category Management')}"></div>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Product Categories</h4>
                    <a th:href="@{/categories/add}" class="btn btn-primary px-4 shadow-sm">
                        <i class="bi bi-plus-lg"></i> Create New
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3 text-secondary text-uppercase small fw-bold" style="width: 100px;">ID</th>
                                    <th class="py-3 text-secondary text-uppercase small fw-bold">Category Name</th>
                                    <th class="py-3 text-secondary text-uppercase small fw-bold">Description</th>
                                    <th class="pe-4 py-3 text-secondary text-uppercase small fw-bold text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cat : ${categories}">
                                    <td class="ps-4 text-muted" th:text="${cat.categoryId}">1</td>
                                    <td class="fw-bold text-dark" th:text="${cat.name}">Electronics</td>
                                    <td class="text-muted" th:text="${cat.description}">General electronic items</td>
                                    <td class="pe-4 text-end">
                                        <a th:href="@{/categories/edit/{id}(id=${cat.categoryId})}" 
                                           class="btn btn-sm btn-outline-primary me-1 border-0">
                                            <i class="bi bi-pencil-square"></i> Edit
                                        </a>
                                        <button type="button" class="btn btn-sm btn-outline-danger border-0" 
                                                data-bs-toggle="modal" 
                                                th:data-bs-target="'#deleteModal-' + ${cat.categoryId}">
                                            <i class="bi bi-trash"></i> Delete
                                        </button>
                                    </td>
                                </tr>
                                
                                <tr th:if="${#lists.isEmpty(categories)}">
                                    <td colspan="4" class="text-center py-5 text-muted">
                                        <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                                        <p class="mb-0">No categories found.</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div th:each="cat : ${categories}">
                <div class="modal fade" th:id="'deleteModal-' + ${cat.categoryId}" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 shadow">
                            <div class="modal-header border-0 pb-0">
                                <h5 class="modal-title fw-bold text-danger">Confirm Deletion</h5>
                                <!-- <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button> -->
                            </div>
                            <div class="modal-body py-4">
                                <p class="mb-1">Are you sure you want to delete this category?</p>
                                <div class="bg-light p-3 rounded mt-3">
                                    <div class="small text-uppercase text-muted fw-bold">Category Name</div>
                                    <div class="fw-bold fs-5" th:text="${cat.name}">Category Name</div>
                                    <div class="small text-muted mt-2" th:text="${cat.description}">Description</div>
                                </div>
                                <p class="text-danger small mt-3 mb-0">
                                    <i class="bi bi-exclamation-triangle-fill"></i> This action cannot be undone.
                                </p>
                            </div>
                            <div class="modal-footer border-0 pt-0">
                                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                                <form th:action="@{/categories/delete/{id}(id=${cat.categoryId})}" method="post">
                                    <button type="submit" class="btn btn-danger px-4">Delete Category</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
