
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Categories - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta charset="UTF-8">
</head>
<body>
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='categories')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='Categories')}"></div>

            <div class="container-fluid p-4">
                <div class="d-flex justify-content-end mb-4">
                    <a th:href="@{/categories/add}" class="btn btn-primary px-4 shadow-sm">
                        <i class="bi bi-plus"></i> + Create Category
                    </a>
                </div>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-0">
                        <table class="table table-hover mb-0 align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th class="ps-4 py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">ID</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Name</th>
                                    <th class="py-3 text-secondary text-uppercase" style="font-size: 0.75rem;">Description</th>
                                    <th class="pe-4 py-3 text-secondary text-uppercase text-end" style="font-size: 0.75rem;">Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cat : ${categories}">
                                    <td class="ps-4" th:text="${cat.categoryId}">1</td>
                                    <td class="fw-bold text-dark" th:text="${cat.name}">Electronics</td>
                                    <td class="text-muted" th:text="${cat.description}">General electronic items</td>
                                    <td class="pe-4 text-end">
                                        <a th:href="@{/categories/edit/{id}(id=${cat.categoryId})}" class="btn btn-sm btn-outline-primary me-2">Edit</a>
                                        <form th:action="@{/categories/delete/{id}(id=${cat.categoryId})}" method="post" class="d-inline">
                                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Delete category?')">Delete</button>
                                        </form>
                                    </td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(categories)}">
                                    <td colspan="4" class="text-center py-5 text-muted">
                                        <p class="mb-0">No categories found.</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
