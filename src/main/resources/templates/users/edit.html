<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <title>Products - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <meta charset="UTF-8">
</head>

<body>
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='users')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='User Management')}"></div>
            <div class="container-fluid p-4">
                <div class="row">
                    <div class="col-12">
                        <div class="card shadow-sm border-0">
                            <div class="card-header bg-white py-3 border-bottom-0">
                                <h5 class="card-title mb-0 text-primary fw-bold">Modify Category Details</h5>
                            </div>

                            <div class="card-body p-4">
                                <form th:action="@{/users/update/{id}(id=${user.userId})}" th:object="${user}"
                                    method="post">
                                    <input type="hidden" th:field="*{userId}" />

                                    <div class="mb-3">
                                        <label for="username" class="form-label">Username</label>
                                        <input type="text" th:field="*{username}" class="form-control" id="username"
                                            required>
                                    </div>

                                    <div class="mb-3">
                                        <label for="role" class="form-label">Role</label>
                                        <select th:field="*{role}" class="form-select" id="role">
                                            <option value="ADMIN">ADMIN</option>
                                            <option value="USER">USER</option>
                                        </select>
                                    </div>

                                    <div class="mb-3 form-check">
                                        <input type="checkbox" th:field="*{enabled}" class="form-check-input"
                                            id="enabled">
                                        <label class="form-check-label" for="enabled">Enabled</label>
                                    </div>

                                    <div class="mb-3">
                                        <label for="password" class="form-label">Password (leave blank to keep
                                            current)</label>
                                        <input type="password" th:field="*{password}" class="form-control"
                                            id="password">
                                    </div>
                                    <div class="d-flex justify-content-end gap-2 pt-4 border-top mt-2">
                                        <a th:href="@{/users}" class="btn btn-secondary">Cancel</a>
                                        <button type="submit" class="btn btn-primary">Update</button>
                                    </div>
                                </form>

                            </div>

                        </div>
                    </div>
                </div>
            </div>

            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</body>

</html>
