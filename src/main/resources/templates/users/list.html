<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <link rel="icon" type="image/png" th:href="@{/image/logo.png}">
    <title>Products - Inventory System</title>
    <link rel="stylesheet" th:href="@{/css/dashboard.css}" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


    <meta charset="UTF-8">
</head>

<body>
    <div class="dashboard-container">
        <div th:replace="~{fragments/layout :: sidebar(activePage='users')}"></div>

        <main class="main-content">
            <div th:replace="~{fragments/layout :: header(pageTitle='User Management')}"></div>
            <div class="overflow-x-auto bg-white shadow-md rounded-lg p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <div></div>
                    <a th:href="@{/users/add}" class="btn btn-primary px-4 shadow-sm">
                        <i class="bi bi-plus-lg"></i> Create New
                    </a>
                </div>
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                        <tr>
                            <th class="p-3 text-secondary text-uppercase small fw-bold">
                                ID</th>
                            <th class="p-3 text-secondary text-uppercase small fw-bold">
                                Username</th>
                            <th class="p-3 text-secondary text-uppercase small fw-bold">
                                Role</th>
                            <th class="p-3 text-secondary text-uppercase small fw-bold">
                                Status</th>
                            <th class="p-3 text-secondary text-uppercase small fw-bold">
                                Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-200 bg-white">
                        <tr th:each="user : ${userPage.content}" class="hover:bg-gray-50">
                            <td class="p-4 text-gray" th:text="${user.userId}"></td>
                            <td class="p-4 text-gray" th:text="${user.username}"></td>
                            <td class="p-4 text-gray" th:text="${user.role}"></td>
                            <td class="p-4 text-gray" th:text="${user.enabled ? 'Active' : 'Disabled'}"></td>
                            <td class="p-4 text-gray">
                                <a th:href="@{/users/edit/{id}(id=${user.userId})}"
                                    class="inline-flex items-center px-3 py-1 text-sm font-medium text-white bg-primary rounded-md hover:bg-indigo-700 no-underline">
                                    Edit
                                </a>
                                <!-- Delete button that triggers modal -->
                                <button type="button"
                                    class="inline-flex items-center px-3 py-1 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700 ml-2"
                                    data-bs-toggle="modal" th:data-bs-target="'#deleteModal-' + ${user.userId}">
                                    Delete
                                </button>
                            </td>
                        </tr>

                    </tbody>
                </table>

                <!-- Pagination -->
                <div class="flex items-center justify-between border-t border-gray-200 px-4 py-3 sm:px-6">
                    <div class="flex flex-1 justify-between sm:hidden">
                        <a th:if="${userPage.hasPrevious()}"
                            th:href="@{/users(page=${userPage.number - 1}, size=${userPage.size})}"
                            class="relative inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Previous</a>
                        <a th:if="${userPage.hasNext()}"
                            th:href="@{/users(page=${userPage.number + 1}, size=${userPage.size})}"
                            class="relative ml-3 inline-flex items-center rounded-md border border-gray-300 bg-white px-4 py-2 text-sm font-medium text-gray-700 hover:bg-gray-50">Next</a>
                    </div>
                    <div class="hidden sm:flex sm:flex-1 sm:items-center sm:justify-between">
                        <div>
                            <p class="text-sm text-gray-700">
                                Showing
                                <span class="font-medium" th:text="${userPage.number * userPage.size + 1}"></span>
                                to
                                <span class="font-medium"
                                    th:text="${(userPage.number + 1) * userPage.size > userPage.totalElements ? userPage.totalElements : (userPage.number + 1) * userPage.size}"></span>
                                of
                                <span class="font-medium" th:text="${userPage.totalElements}"></span>
                                results
                            </p>
                        </div>
                        <div>
                            <nav class="isolate inline-flex -space-x-px rounded-md shadow-sm" aria-label="Pagination">
                                <a th:if="${userPage.hasPrevious()}"
                                    th:href="@{/users(page=${userPage.number - 1}, size=${userPage.size})}"
                                    class="relative inline-flex items-center rounded-l-md px-2 py-2 text-gray-400 ring-1 ring-gray-300 hover:bg-gray-50 focus:z-20">
                                    <span class="sr-only">Previous</span>
                                    <!-- Left Arrow -->
                                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd"
                                            d="M11.78 5.22a.75.75 0 0 1 0 1.06L8.06 10l3.72 3.72a.75.75 0 1 1-1.06 1.06l-4.25-4.25a.75.75 0 0 1 0-1.06l4.25-4.25a.75.75 0 0 1 1.06 0Z"
                                            clip-rule="evenodd" />
                                    </svg>
                                </a>

                                <!-- Page Numbers -->
                                <span
                                    class="relative z-10 inline-flex items-center bg-indigo-600 px-4 py-2 text-sm font-semibold text-white">
                                    <span th:text="${userPage.number + 1}"></span>
                                </span>

                                <a th:if="${userPage.hasNext()}"
                                    th:href="@{/users(page=${userPage.number + 1}, size=${userPage.size})}"
                                    class="relative inline-flex items-center rounded-r-md px-2 py-2 text-gray-400 ring-1 ring-gray-300 hover:bg-gray-50 focus:z-20">
                                    <span class="sr-only">Next</span>
                                    <!-- Right Arrow -->
                                    <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd"
                                            d="M8.22 5.22a.75.75 0 0 1 1.06 0l4.25 4.25a.75.75 0 0 1 0 1.06l-4.25 4.25a.75.75 0 0 1-1.06-1.06L11.94 10 8.22 6.28a.75.75 0 0 1 0-1.06Z"
                                            clip-rule="evenodd" />
                                    </svg>
                                </a>
                            </nav>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Modal-delete  -->
            <div th:each="user : ${userPage.content}">
                <div class="modal fade" th:id="'deleteModal-' + ${user.userId}" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-dialog-centered">
                        <div class="modal-content border-0 shadow">
                            <div class="modal-header border-0 pb-0">
                                <h5 class="modal-title fw-bold text-danger">Confirm Deletion</h5>
                            </div>
                            <div class="modal-body py-4">
                                <p class="mb-1">Are you sure you want to delete this user?</p>
                                <div class="bg-light p-3 rounded mt-3">
                                    <div class="small text-uppercase text-muted fw-bold">Username</div>
                                    <div class="fw-bold fs-5" th:text="${user.username}">Username</div>
                                    <div class="small text-uppercase text-muted fw-bold mt-2">Role</div>
                                    <div class="fw-bold" th:text="${user.role}">Role</div>
                                    <div class="small text-muted mt-2"
                                        th:text="${user.enabled ? 'Active' : 'Disabled'}">Status</div>
                                </div>
                                <p class="text-danger small mt-3 mb-0">
                                    <i class="bi bi-exclamation-triangle-fill"></i> This action cannot be undone.
                                </p>
                            </div>
                            <div class="modal-footer border-0 pt-0">
                                <button type="button" class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                                <form th:action="@{/users/delete/{id}(id=${user.userId})}" method="post">
                                    <button type="submit" class="btn btn-danger px-4">Delete User</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:replace="~{fragments/layout :: footer}"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
</body>

</html>
